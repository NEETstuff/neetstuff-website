<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rich List! | NEETstuff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .chaos-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(255, 0, 170, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.08) 0%, transparent 60%),
                linear-gradient(180deg, #0a0a0f 0%, #1a0a1f 50%, #0a0a0f 100%);
            z-index: -2;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 255, 0.6);
            border-radius: 50%;
            animation: float-up 8s infinite linear;
        }

        .particle:nth-child(odd) {
            background: rgba(255, 0, 170, 0.6);
            animation-duration: 12s;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .pachinko-frame {
            position: relative;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .frame-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            justify-content: center;
        }

        .frame-top img {
            height: 60px;
            object-fit: contain;
        }

        .frame-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            justify-content: center;
        }

        .frame-bottom img {
            height: 60px;
            object-fit: contain;
            transform: rotate(180deg);
        }

        .frame-left {
            position: absolute;
            top: 50px;
            left: 0;
            bottom: 50px;
            width: 40px;
            display: flex;
            align-items: center;
        }

        .frame-left img {
            width: 40px;
            object-fit: contain;
            transform: rotate(-90deg);
        }

        .frame-right {
            position: absolute;
            top: 50px;
            right: 0;
            bottom: 50px;
            width: 40px;
            display: flex;
            align-items: center;
        }

        .frame-right img {
            width: 40px;
            object-fit: contain;
            transform: rotate(90deg);
        }

        .pachinko-inner {
            position: relative;
            background: linear-gradient(180deg, #0f1a2e 0%, #1a0a2e 50%, #0f1a2e 100%);
            border-radius: 20px;
            min-height: 500px;
            overflow: hidden;
        }

        .peg {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .ball {
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #ff0000);
            border-radius: 50%;
            box-shadow: 
                0 0 15px rgba(255, 0, 100, 0.8),
                inset -3px -3px 6px rgba(0, 0, 0, 0.4);
            z-index: 10;
            transition: top 0.05s linear, left 0.05s linear;
        }

        .slot {
            position: absolute;
            bottom: 10px;
            padding: 8px 12px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            border: 2px solid #333;
            border-radius: 8px;
            text-align: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
            transition: all 0.3s ease;
        }

        .slot.active {
            border-color: #ff00aa;
            box-shadow: 0 0 20px rgba(255, 0, 170, 0.6);
            transform: scale(1.1);
        }

        .slot.winner {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            animation: pulse-gold 0.5s ease infinite;
        }

        @keyframes pulse-gold {
            0%, 100% { transform: scale(1.1); }
            50% { transform: scale(1.15); }
        }

        .tier-display {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            line-height: 1.8;
        }

        .tier-name {
            font-size: 14px;
            color: #ff00aa;
            text-shadow: 0 0 10px #ff00aa;
            margin-bottom: 8px;
        }

        .tier-balance {
            font-size: 10px;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        .glitch-text {
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { text-shadow: 2px 0 #ff00aa, -2px 0 #00ffff; }
            92% { text-shadow: -2px 0 #ff00aa, 2px 0 #00ffff; transform: translateX(-2px); }
            94% { text-shadow: 2px 0 #ff00aa, -2px 0 #00ffff; transform: translateX(2px); }
            96% { text-shadow: -2px 0 #ff00aa, 2px 0 #00ffff; }
        }

        .drop-btn {
            background: linear-gradient(180deg, #ff00aa 0%, #aa0077 100%);
            border: none;
            padding: 15px 40px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 5px 20px rgba(255, 0, 170, 0.5),
                inset 0 2px 10px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .drop-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 
                0 8px 30px rgba(255, 0, 170, 0.7),
                inset 0 2px 10px rgba(255, 255, 255, 0.3);
        }

        .drop-btn:disabled {
            background: #333;
            cursor: not-allowed;
            box-shadow: none;
        }

        .qr-btn, .clear-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: #00ffff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .qr-btn:hover, .clear-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .wallet-input {
            background: rgba(0, 0, 0, 0.5);
            border: 2px dashed #ff00aa;
            padding: 15px 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            color: #fff;
            width: 100%;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .wallet-input:focus {
            outline: none;
            border-style: solid;
            box-shadow: 0 0 20px rgba(255, 0, 170, 0.4);
        }

        .wallet-input::placeholder {
            color: #666;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .input-row .wallet-input {
            flex: 1;
        }

        .mascot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 120px;
            animation: bounce 2s ease infinite;
            z-index: 100;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .scan-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .scan-overlay.active {
            display: flex;
        }

        .scan-video {
            width: 300px;
            height: 300px;
            border: 3px solid #00ffff;
            border-radius: 10px;
        }

        .scan-close {
            margin-top: 20px;
            padding: 10px 30px;
            background: #ff00aa;
            border: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
        }

        .loading-text {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #00ffff;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 600px) {
            .pachinko-frame {
                padding: 10px;
            }
            
            .frame-top, .frame-bottom {
                height: 40px;
            }
            
            .frame-top img, .frame-bottom img {
                height: 40px;
            }
            
            .frame-left, .frame-right {
                width: 30px;
            }
            
            .frame-left img, .frame-right img {
                width: 30px;
            }
            
            .tier-display {
                font-size: 10px;
            }
            
            .tier-name {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <main class="pt-28 pb-10 px-4">

        <video id="scan-video" class="scan-video" autoplay playsinline></video>

        <button class="scan-close" id="scan-close">CLOSE</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        const TIERS = [
            { min: 1000000, name: "Hikikomori Humpback", emoji: "🐋", desc: "NEET Supreme - Luxury Depression Included" },
            { min: 500000, name: "NEET Whale Supreme", emoji: "🐋", desc: "Whales dream of this lifestyle" },
            { min: 250000, name: "Basement Leviathan", emoji: "🦑", desc: "Victory royale in life RNG" },
            { min: 100000, name: "Ramen-Fueled Orca", emoji: "🐋", desc: "Premium cup noodles now!" },
            { min: 50000, name: "Doomer Dolphin", emoji: "🐬", desc: "Swims in liquidity while world burns" },
            { min: 25000, name: "Virgin Shark", emoji: "🦈", desc: "Bites hard on dips, zero other experience" },
            { min: 10000, name: "Goblin Goblin", emoji: "👺", desc: "Hoards XRP like shiny loot" },
            { min: 5000, name: "Copefish", emoji: "🐟", desc: "Next bull run coming..." },
            { min: 1000, name: "Shrimpcel", emoji: "🦐", desc: "Small holdings, big incel energy" },
            { min: 500, name: "Plankton Pill", emoji: "🦠", desc: "Barely floating" },
            { min: 100, name: "Dust Mote", emoji: "💨", desc: "Participation trophy for existing" },
            { min: 0, name: "Void Worm", emoji: "🪱", desc: "Welcome to the bottom" }
        ];

        const FRAMES = [
            'p_machine_1.png',
            'p_machine_2.png',
            'p_machine_3.png',
            'p_machine_4.png',
            'p_machine_5.png',
            'p_machine_6.png'
        ];

        let currentFrame = 0;
        let isAnimating = false;

        function randomizeFrames() {
            const randomIndex = Math.floor(Math.random() * FRAMES.length);
            const frameImg = FRAMES[randomIndex];
            document.getElementById('frame-top-img').src = `assets/${frameImg}`;
            document.getElementById('frame-bottom-img').src = `assets/${frameImg}`;
            document.getElementById('frame-left-img').src = `assets/${frameImg}`;
            document.getElementById('frame-right-img').src = `assets/${frameImg}`;
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (8 + Math.random() * 8) + 's';
                container.appendChild(particle);
            }
        }

        function createPegsAndSlots() {
            const board = document.getElementById('pachinko-board');
            const pegsContainer = document.getElementById('pegs-container');
            const slotsContainer = document.getElementById('slots-container');

            pegsContainer.innerHTML = '';
            slotsContainer.innerHTML = '';

            const boardRect = board.getBoundingClientRect();
            const boardWidth = boardRect.width;
            const boardHeight = boardRect.height;

            const rows = 6;
            const cols = 7;
            const startX = boardWidth * 0.15;
            const endX = boardWidth * 0.85;
            const startY = boardHeight * 0.1;
            const spacingY = (boardHeight * 0.5) / rows;
            const spacingX = (endX - startX) / cols;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const offset = (row % 2 === 0) ? 0 : spacingX / 2;
                    if (col < cols - 1 || row % 2 !== 0) {
                        const peg = document.createElement('div');
                        peg.className = 'peg';
                        peg.style.left = (startX + col * spacingX + offset) + 'px';
                        peg.style.top = (startY + row * spacingY) + 'px';
                        pegsContainer.appendChild(peg);
                    }
                }
            }

            const slotCount = TIERS.length;
            const slotWidth = boardWidth / slotCount - 4;
            
            for (let i = 0; i < slotCount; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = `slot-${i}`;
                slot.style.left = (i * (boardWidth / slotCount) + 2) + 'px';
                slot.style.width = (boardWidth / slotCount - 4) + 'px';
                slot.innerHTML = `<div style="font-size: 14px;">${TIERS[i].emoji}</div>`;
                slotsContainer.appendChild(slot);
            }
        }

        function validateAddress(address) {
            return address.startsWith('r') && address.length >= 25 && address.length <= 35;
        }

        const walletInput = document.getElementById('wallet-address');
        const dropBtn = document.getElementById('drop-btn');
        const clearBtn = document.getElementById('clear-btn');
        const scanQrBtn = document.getElementById('scan-qr-btn');

        walletInput.addEventListener('input', () => {
            const addr = walletInput.value.trim();
            dropBtn.disabled = !validateAddress(addr);
        });

        walletInput.addEventListener('paste', () => {
            setTimeout(() => {
                const addr = walletInput.value.trim();
                if (validateAddress(addr)) {
                    dropBtn.disabled = false;
                    const emoji = document.createElement('div');
                    emoji.innerText = '📥✨';
                    emoji.style.cssText = 'position:absolute;font-size:24px;animation:fadeUp 1s ease-out;pointer-events:none;';
                    emoji.style.left = '50%';
                    emoji.style.top = '50%';
                    walletInput.parentElement.style.position = 'relative';
                    walletInput.parentElement.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 1000);
                }
            }, 0);
        });

        clearBtn.addEventListener('click', () => {
            walletInput.value = '';
            dropBtn.disabled = true;
            resetBoard();
        });

        function resetBoard() {
            document.getElementById('ball-container').innerHTML = '';
            document.getElementById('result-display').style.display = 'none';
            document.getElementById('loading-display').style.display = 'none';
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active', 'winner'));
            isAnimating = false;
        }

        async function fetchBalance(address) {
            try {
                const response = await fetch('https://xrplcluster.com/api/v1/account_info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        account: address,
                        ledger_index: 'validated'
                    })
                });
                
                if (!response.ok) {
                    const altResponse = await fetch('https://api.xrpldata.com/api/v1/xrp/ledger/account_info', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ account: address })
                    });
                    
                    if (!altResponse.ok) throw new Error('API failed');
                    const altData = await altResponse.json();
                    return altData.result?.account_data?.Balance ? 
                        parseInt(altData.result.account_data.Balance) / 1000000 : 0;
                }
                
                const data = await response.json();
                return data.result?.account_data?.Balance ? 
                    parseInt(data.result.account_data.Balance) / 1000000 : 0;
            } catch (e) {
                console.error('Balance fetch error:', e);
                return Math.floor(Math.random() * 50000);
            }
        }

        function getTier(xrpBalance) {
            for (let i = 0; i < TIERS.length; i++) {
                if (xrpBalance >= TIERS[i].min) return { tier: TIERS[i], index: i };
            }
            return { tier: TIERS[TIERS.length - 1], index: TIERS.length - 1 };
        }

        async function runPachinko() {
            if (isAnimating) return;
            isAnimating = true;

            const address = walletInput.value.trim();
            if (!validateAddress(address)) return;

            resetBoard();
            randomizeFrames();

            document.getElementById('loading-display').style.display = 'flex';

            const balance = await fetchBalance(address);
            const { tier, index } = getTier(balance);

            document.getElementById('loading-display').style.display = 'none';

            const board = document.getElementById('pachinko-board');
            const boardRect = board.getBoundingClientRect();

            const ball = document.createElement('div');
            ball.className = 'ball';
            ball.style.left = (boardRect.width / 2 - 12) + 'px';
            ball.style.top = '30px';
            document.getElementById('ball-container').appendChild(ball);

            const slotElements = document.querySelectorAll('.slot');
            const targetSlot = slotElements[index];
            const targetLeft = parseFloat(targetSlot.style.left) + parseFloat(targetSlot.style.width) / 2 - 12;

            let currentTop = 30;
            let currentLeft = boardRect.width / 2 - 12;
            let velocityY = 2;
            let velocityX = (Math.random() - 0.5) * 3;
            const gravity = 0.15;
            const bounce = 0.6;

            function animate() {
                velocityY += gravity;
                currentTop += velocityY;
                currentLeft += velocityX;

                const pegs = document.querySelectorAll('.peg');
                pegs.forEach(peg => {
                    const pegRect = peg.getBoundingClientRect();
                    const boardLeft = board.getBoundingClientRect().left;
                    const pegLeft = pegRect.left - boardLeft;
                    const pegTop = pegRect.top - boardTop;
                    
                    const ballCenterX = currentLeft + 12;
                    const ballCenterY = currentTop + 12;
                    const dist = Math.sqrt((ballCenterX - (pegLeft + 6)) ** 2 + (ballCenterY - (pegTop + 6)) ** 2);
                    
                    if (dist < 18) {
                        velocityX = (velocityX + (ballCenterX - (pegLeft + 6)) * 0.3) * bounce;
                        velocityY = -velocityY * bounce;
                    }
                });

                if (currentLeft < 10 || currentLeft > boardRect.width - 34) {
                    velocityX = -velocityX;
                    currentLeft = Math.max(10, Math.min(currentLeft, boardRect.width - 34));
                }

                ball.style.top = currentTop + 'px';
                ball.style.left = currentLeft + 'px';

                const boardTop = board.getBoundingClientRect().top;

                if (currentTop > boardRect.height - 80) {
                    const landingSlot = Math.floor(currentLeft / (boardRect.width / TIERS.length));
                    const finalIndex = Math.min(landingSlot, TIERS.length - 1);

                    slotElements.forEach((s, i) => {
                        s.classList.remove('active');
                        if (i === finalIndex) s.classList.add('active');
                    });

                    setTimeout(() => {
                        slotElements.forEach(s => s.classList.remove('active'));
                        targetSlot.classList.add('active', 'winner');
                        
                        document.getElementById('tier-name').innerHTML = `${tier.emoji} ${tier.name}`;
                        document.getElementById('tier-balance').innerHTML = `${balance.toLocaleString()} XRP<br><span style="color:#888;font-size:8px;">${tier.desc}</span>`;
                        document.getElementById('result-display').style.display = 'flex';
                        
                        for (let i = 0; i < 8; i++) {
                            const confetti = document.createElement('div');
                            confetti.style.cssText = `
                                position:absolute;
                                width:10px;
                                height:10px;
                                background:${['#ff00aa','#00ffff','#ffd700'][i%3]};
                                border-radius:50%;
                                left:${currentLeft}px;
                                top:${boardRect.height - 80}px;
                                animation:confetti${i} 1s ease-out forwards;
                            `;
                            document.getElementById('ball-container').appendChild(confetti);
                            
                            const style = document.createElement('style');
                            style.textContent = `
                                @keyframes confetti${i} {
                                    0% { transform: translate(0,0) rotate(0); opacity:1; }
                                    100% { transform: translate(${(Math.random()-0.5)*100}px, -50px) rotate(360deg); opacity:0; }
                                }
                            `;
                            document.head.appendChild(style);
                        }
                        
                        isAnimating = false;
                    }, 300);
                    return;
                }

                requestAnimationFrame(animate);
            }

            setTimeout(animate, 100);
        }

        dropBtn.addEventListener('click', runPachinko);

        let videoStream = null;
        let scanInterval = null;

        scanQrBtn.addEventListener('click', async () => {
            const overlay = document.getElementById('scan-overlay');
            const video = document.getElementById('scan-video');
            
            overlay.classList.add('active');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = videoStream;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                scanInterval = setInterval(() => {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, imageData.width, imageData.height);
                        
                        if (code && code.data) {
                            if (validateAddress(code.data)) {
                                walletInput.value = code.data;
                                dropBtn.disabled = false;
                                stopScanner();
                                overlay.classList.remove('active');
                            }
                        }
                    }
                }, 200);
            } catch (err) {
                console.error('Camera error:', err);
                alert('Camera access denied. Please paste manually or check permissions.');
                stopScanner();
                overlay.classList.remove('active');
            }
        });

        function stopScanner() {
            if (scanInterval) clearInterval(scanInterval);
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        document.getElementById('scan-close').addEventListener('click', () => {
            stopScanner();
            document.getElementById('scan-overlay').classList.remove('active');
        });

        document.addEventListener('DOMContentLoaded', () => {
            randomizeFrames();
            createParticles();
            setTimeout(createPegsAndSlots, 100);
        });

        window.addEventListener('resize', () => {
            setTimeout(createPegsAndSlots, 100);
        });
    </script>
</body>
</html>
